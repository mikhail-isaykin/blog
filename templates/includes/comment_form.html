<form action="{% url 'blog:post_comment' post.id %}"
      method="post"
      novalidate>
  {% csrf_token %}
  <div class="row">
    <h3>Add a new comment</h3>
    <div class="col mt-2">
      {{ form.name }}
      {% if form.name.errors %}
        <div class="text-danger">{{ form.name.errors }}</div>
      {% endif %}
    </div>
    <div class="col mt-2">
      {{ form.email }}
      {% if form.email.errors %}
        <div class="text-danger">{{ form.email.errors }}</div>
      {% endif %}
    </div>
    <div class="mt-2">
      {{ form.body }}
      {% if form.body.errors %}
        <div class="text-danger">{{ form.body.errors }}</div>
      {% endif %}
    </div>
    <div class="mt-3">
      <input type="submit" class="btn btn-primary mb-3" value="Add comment">
    </div>
  </div>
</form>
